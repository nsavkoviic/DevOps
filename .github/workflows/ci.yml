# ─────────────────────────────────────────────────────────────────
# CI Pipeline — Build, Test & Code Quality
# Triggers on push/PR to main and dev branches.
# ─────────────────────────────────────────────────────────────────

name: CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, dev ]

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ────────────────────────────────────────────────────────────────
  # Build & Test
  # ────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore DevOpsProject.sln

      - name: Build solution
        run: dotnet build DevOpsProject.sln --configuration Release --no-restore

      - name: Run unit tests
        run: |
          dotnet test tests/UserService.Tests/UserService.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=user-results.trx"
          dotnet test tests/ProductService.Tests/ProductService.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=product-results.trx"
          dotnet test tests/OrderService.Tests/OrderService.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=order-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  # ────────────────────────────────────────────────────────────────
  # Code Quality — .NET Analyzers
  # ────────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore DevOpsProject.sln

      - name: Build with warnings as errors
        run: dotnet build DevOpsProject.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=true

  # ────────────────────────────────────────────────────────────────
  # Docker Build — verify images build successfully
  # ────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    strategy:
      matrix:
        service:
          - name: user-service
            dockerfile: src/UserService/Dockerfile
          - name: product-service
            dockerfile: src/ProductService/Dockerfile
          - name: order-service
            dockerfile: src/OrderService/Dockerfile
          - name: notification-service
            dockerfile: src/NotificationService/Dockerfile
          - name: api-gateway
            dockerfile: src/ApiGateway/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image — ${{ matrix.service.name }}
        run: |
          docker build \
            -f ${{ matrix.service.dockerfile }} \
            -t devops/${{ matrix.service.name }}:ci-${{ github.sha }} \
            ./src
